<!--This is where the data is saved-->
<!DOCTYPE html>
<html>

    <header style="position: relative;">
        <h1 style="font-family: sans-serif; margin-left: 560px;position: fixed;color: white;background-color: red;">
            Reports
        </h1>
        <img src="Logo.png" alt="Logo" width="150px" height="75">
    </header>

    <body>
        <div id="reports-list"></div>



      <script>
    fetch('http://127.0.0.1:5000/api/reports') 
        .then(response => response.json())
        .then(data => {
            const listContainer = document.getElementById('reports-list');
            listContainer.innerHTML = ''; 
            
            data.forEach(report => {   //the Elements//
                listContainer.innerHTML += `
                    <div style="border: 1px solid #ccc; margin: 10px; padding: 10px; border-radius: 5px;">
                        <h3>${report.incident_english || 'Incident'}</h3>
                        <p><strong>Incident (Urdu):</strong> ${report.incident_urdu || 'N/A'}</p>
                        <p><strong>Location:</strong> ${report.location_english || 'N/A'}</p>
                        <p><strong>Location (Urdu):</strong> ${report.location_urdu || 'N/A'}</p>
                        <p><strong>Coordinates:</strong> ${report.latitude}, ${report.longitude}</p>
                        <p><strong>Severity:</strong> ${report.score}</p>
                        <p><strong>Reason:</strong> ${report.reason || 'N/A'}</p>
                        <p><strong>Reported By:</strong> ${report.name || 'Anonymous'}</p>
                        <p><strong>Message:</strong> ${report.message || 'N/A'}</p>
                    </div>
                `;
            });
        })
        .catch(err => console.error('Error fetching reports:', err)); //for errors//
</script>
    </body>




</html>
