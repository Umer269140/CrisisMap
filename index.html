<!--This is the form which user will fill.-->
<html style="background-color: rgb(255, 255, 255);">
    <header style="text-align: center; font-family: Arial, sans-serif; color: #333; margin-right:30px; margin-bottom: 50px">
         <title>CrisisMap</title>
        <H1 style="display: flex; align-items: center; gap:10px; justify-content: center;"> <img src="Logo.png"  width="200" height="100">Welcome to CrisisMap</H1>
        <H2 style="margin-top: 50px;">What is CrisisMap?</H2> 
        <p style="margin-top: 30px;">Crisis Map is a platform for your help. Fill the form below and let the departments come to rescue you.</p>

    </header>

    
    <body style="font-family: Arial, sans-serif; color: #333; margin-right:30px; text-align: center;">

        <form id="userForm">

             <div style="margin-left: 37px; text-align: center; ">
                <label for="name"; text-align: centre;>Name </label>      
                <input id="name" required placeholder="Umer">
            </div>
   
            <br>
     
             <div style="margin-top:30px; margin-left: 37px;">
                <label for = "Location">Location</label>
                <input placeholder="DHA" type="text" id="Location" name="Location">
             </div>

              <br margin-top = 30px>

             <div style="margin-top: 30px; margin-left: 37px;">
                <label for = Emergency> Emergency: </label>
                <textarea id="Emergency" required placeholder="Please describe the emergency situation..." ></textarea>
             </div>    

             <br margin-top = 30px>

            

             
            <button  type="button" onclick="fetchData()" style="margin-top: 20px;width: 100px;height: 35px;font-family: Arial, sans-serif;  background-color: #ea0000;border-radius: 5px;border: none; color: white;cursor: pointer;" >Submit</button>


        </form>

         
        <script> //was routing to score, but i have changed the route, score is saving in report.
            async function fetchData() {
                const message = document.getElementById("Emergency").value;
                const location = document.getElementById("Location").value;
                const name = document.getElementById("name").value;
                const phone = document.getElementById("phone").value;
                const response = await fetch('http://127.0.0.1:5000/api/score', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        location: location,
                        name: name,
                    })
                });
                const result = await response.json();
                console.log(result);
                window.location.href = 'Afterform.html';
            }
    
                                    
            
        </script>
       

    </body>


</html>
